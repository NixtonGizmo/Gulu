<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Lovely Gulu ❤️</title>
    <style>
        :root {
            --pink-main: #ff4d6d;
            --pink-light: #ffccd5;
            --pink-bg: #fff0f3;
            --green-main: #9cb315;
            --grey-main: #b0b0b0;
            --text-dark: #5a3a45;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6ea 0%, #fdfbfb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dark);
            padding: 20px;
            box-sizing: border-box;
            gap: 15px;
        }

        /* Separate Box Layout */
        .box {
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 143, 163, 0.15);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { color: var(--pink-main); font-size: 26px; margin: 0 0 5px 0; }
        .subtitle { font-size: 14px; color: #888; }
        
        .box-note {
            background: var(--pink-bg);
            border: 2px solid var(--pink-light);
            font-size: 16px; font-style: italic; color: #800f2f;
            line-height: 1.4;
        }

        /* Scrollable Map */
        .box-calendar { padding: 15px 5px; cursor: pointer; }
        .scrollable-map {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 5px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrollable-map::-webkit-scrollbar { display: none; }
        
        .day-card {
            min-width: 52px;
            padding: 12px 0;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
            transition: transform 0.2s;
        }
        .day-card.today {
            border: 2px dashed var(--text-dark);
        }
        .day-card.period {
            background: var(--pink-main);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 77, 109, 0.4);
        }
        .day-card.ovulation {
            background: var(--green-main);
            color: white;
            box-shadow: 0 4px 12px rgba(156, 179, 21, 0.4);
        }
        .day-card .day-name { font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; opacity: 0.85; }
        .day-card .day-num { font-size: 18px; font-weight: bold; }

        .tap-hint { font-size: 11px; color: #aaa; margin-top: 8px; }

        /* Full Map Modal & Cute Date Picker */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: white; border-radius: 25px;
            padding: 20px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; }
        
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
        }
        .cal-header { font-size: 12px; color: #888; font-weight: bold; padding-bottom: 8px; text-align: center;}
        .cal-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 14px; cursor: pointer; font-weight: 500;
        }
        .cal-cell.period { background: var(--pink-main); color: white; }
        .cal-cell.ovulation { background: var(--green-main); color: white; }
        .cal-cell:hover { background: #f0f0f0; }

        /* Cute Buttons & Status */
        .cute-btn {
            background: var(--pink-light); color: var(--text-dark);
            padding: 12px 20px; border-radius: 15px; border: 2px dashed var(--pink-main);
            font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;
            transition: all 0.3s ease;
        }
        .cute-btn:hover { background: var(--pink-main); color: white; border-style: solid; }
        .sync-status { font-size: 11px; color: #aaa; margin-top: 10px; }
        .countdown-text { font-size: 18px; font-weight: bold; color: #800f2f; }
    </style>
</head>
<body>

    <!-- Box 1: Header -->
    <div class="box" style="border-bottom: 4px solid var(--pink-main);">
        <h1>Hi, Gulu! ❤️</h1>
        <div class="subtitle">Your personal tracker, made with love.</div>
    </div>

    <!-- Box 2: Daily Note -->
    <div class="box box-note" id="dailyNote">Loading your daily sweet note...</div>

    <!-- Box 3: Scrollable Weekly Map -->
    <div class="box box-calendar" onclick="openFullMap()">
        <div class="scrollable-map" id="scrollMap"></div>
        <div class="tap-hint">👆 Tap map to open full month view</div>
    </div>

    <!-- Box 4: Countdown -->
    <div class="box">
        <div class="countdown-text" id="countdown">Calculating...</div>
    </div>

    <!-- Box 5: Update Date -->
    <div class="box">
        <label style="color: #888; font-size: 13px; margin-bottom: 10px; display: block;">Did it start on a different day?</label>
        <button class="cute-btn" onclick="openDatePicker()">🗓️ Update Start Date</button>
        <div class="sync-status" id="syncStatus">☁️ Connected</div>
    </div>

    <!-- FULL MAP / DATE PICKER MODAL -->
    <div class="modal-overlay" id="mapModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" style="color: var(--pink-main); margin: 0; font-size: 20px;">Calendar Map</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modalInstructions" style="font-size: 12px; color: #888; margin-bottom: 15px; display: none;">
                Tap the exact day her period started to update it:
            </div>
            <div class="calendar-grid" id="fullCalendarGrid"></div>
        </div>
    </div>

    <script>
        const cycleLength = 26;
        const periodDuration = 7;
        
        // 🔴 FIREBASE URL INTEGRATED HERE
        const FIREBASE_URL = "https://gulu100103-default-rtdb.asia-southeast1.firebasedatabase.app/lastDate.json";

        const notes = [
            "You are my favorite notification. Have a beautiful day, Gulu! 💕",
            "Just a daily reminder that you are deeply loved and cherished. 🥰",
            "Drink some water, take a deep breath, and know I'm thinking of you! 💧",
            "Your smile is my favorite thing in the whole world. Keep shining! ✨",
            "I'm so incredibly lucky to have you in my life. ❤️",
            "Whatever today brings, we handle it together. I love you! 🌸",
            "You are stronger and more beautiful than you know, Gulu! 🦋",
            "Sending you a massive virtual hug right now! 🤗",
            "You make every single day better just by being in it. ☀️",
            "Don't forget to treat yourself today. You deserve the world! 🍫",
            "I love you more today than I did yesterday. ❤️",
            "You are my safe place and my favorite adventure. 🌍",
            "Take it easy today, Gulu. I'm always right here for you. 🛋️",
            "Your laugh is my favorite melody. Hope you smile a lot today! 🎶",
            "Just dropping in to say: You are absolutely perfect to me. 😍",
            "You're doing amazing, sweetie! Keep going! 🌟",
            "I hope your day is as sweet and beautiful as you are. 🌷",
            "If you're feeling tired, rest. I've got your back, always. 🛌",
            "You are the best thing that ever happened to me. 💖",
            "Every day I spend with you is my new favorite day. 📆",
            "I'm sending you all my energy and love today! ⚡❤️",
            "You are a literal angel. Never forget that! 👼",
            "I'm so proud of you and everything you do. 🏆",
            "You mean the universe to me, Gulu. 🌌",
            "Take a moment to relax today. You've earned it! 🛀",
            "You're my forever favorite person. 👩‍❤️‍👨",
            "I love you past the moon and the stars! 🚀",
            "Whenever you feel stressed, remember I'm just a call away. 📞",
            "You look gorgeous today (I just know it!). 👗",
            "My love for you grows bigger every single day. 📈",
            "You are my dream come true. Sweet dreams, my Gulu. 💭"
        ];

        let lastPeriodDate = new Date('2026-07-06');

        function getDayStatus(dateToCheck) {
            const date = new Date(dateToCheck);
            date.setHours(0,0,0,0);
            const start = new Date(lastPeriodDate);
            start.setHours(0,0,0,0);

            const diffTime = date - start;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            let dayOfCycle = diffDays % cycleLength;
            if (dayOfCycle < 0) dayOfCycle += cycleLength;

            if (dayOfCycle >= 0 && dayOfCycle < periodDuration) return 'period';
            if (dayOfCycle === 14) return 'ovulation';
            return 'normal';
        }

        async function init() {
            document.getElementById('dailyNote').innerText = notes[new Date().getDate() - 1];
            document.getElementById('syncStatus').innerText = "☁️ Syncing data...";
            
            lastPeriodDate = await fetchDateFromDB();
            
            updateDisplay();
            document.getElementById('syncStatus').innerText = "☁️ Up to date";
        }

        function updateDisplay() {
            renderScrollableMap();
            updateCountdown();
        }

        function renderScrollableMap() {
            const container = document.getElementById('scrollMap');
            container.innerHTML = '';
            const today = new Date();
            today.setHours(0,0,0,0);
            const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            for(let i = -15; i <= 15; i++) {
                let d = new Date(today);
                d.setDate(today.getDate() + i);
                
                const status = getDayStatus(d);
                const isToday = i === 0;

                let card = document.createElement('div');
                card.className = `day-card ${status} ${isToday ? 'today' : ''}`;
                if (isToday) card.id = 'todayCard';

                card.innerHTML = `
                    <div class="day-name">${daysOfWeek[d.getDay()]}</div>
                    <div class="day-num">${d.getDate()}</div>
                `;
                container.appendChild(card);
            }
            
            setTimeout(() => {
                const todayEl = document.getElementById('todayCard');
                if (todayEl) todayEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }, 100);
        }

        function renderFullCalendar(forDatePicking = false) {
            const grid = document.getElementById('fullCalendarGrid');
            grid.innerHTML = '';
            
            const daysOfWeek = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            daysOfWeek.forEach(day => {
                grid.innerHTML += `<div class="cal-cell cal-header">${day}</div>`;
            });

            const today = new Date();
            const startRenderDate = new Date(today.getFullYear(), today.getMonth(), 1);
            const startDay = startRenderDate.getDay();
            startRenderDate.setDate(startRenderDate.getDate() - startDay);

            for(let i = 0; i < 42; i++) {
                let cellDate = new Date(startRenderDate);
                cellDate.setDate(startRenderDate.getDate() + i);
                
                const status = forDatePicking ? 'normal' : getDayStatus(cellDate);
                
                let cell = document.createElement('div');
                cell.className = `cal-cell ${status}`;
                if (cellDate.getMonth() !== today.getMonth()) cell.style.opacity = '0.3';
                cell.innerText = cellDate.getDate();

                if (forDatePicking) {
                    cell.onclick = () => confirmNewDate(cellDate);
                }

                grid.appendChild(cell);
            }
        }

        function updateCountdown() {
            const today = new Date();
            today.setHours(0,0,0,0);
            const nextPeriod = new Date(lastPeriodDate);
            nextPeriod.setDate(lastPeriodDate.getDate() + cycleLength);
            
            const checkDate = new Date(nextPeriod);
            checkDate.setHours(0,0,0,0);
            const diffTime = checkDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            let txt = "";
            if (diffDays > 0) txt = `⏳ ${diffDays} days left until period.`;
            else if (diffDays <= 0 && diffDays > -periodDuration) txt = `🩸 Period active. Heating pad ready! ❤️`;
            else txt = `⏰ It's ${Math.abs(diffDays)} days late!`;
            
            document.getElementById('countdown').innerText = txt;
        }

        function openFullMap() {
            document.getElementById('modalTitle').innerText = "Cycle Map";
            document.getElementById('modalInstructions').style.display = 'none';
            renderFullCalendar(false);
            document.getElementById('mapModal').style.display = 'flex';
        }

        function openDatePicker() {
            document.getElementById('modalTitle').innerText = "Select Start Date";
            document.getElementById('modalInstructions').style.display = 'block';
            renderFullCalendar(true);
            document.getElementById('mapModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('mapModal').style.display = 'none';
        }

        async function confirmNewDate(selectedDate) {
            lastPeriodDate = selectedDate;
            closeModal();
            updateDisplay();
            
            let y = selectedDate.getFullYear();
            let m = String(selectedDate.getMonth() + 1).padStart(2, '0');
            let d = String(selectedDate.getDate()).padStart(2, '0');
            let dateStr = `${y}-${m}-${d}`;
            
            await saveDateToDB(dateStr);
            alert("New date saved globally! Gulu's phone will update automatically too. ❤️");
        }

        // --- DATABASE FETCH & SAVE ---
        async function fetchDateFromDB() {
            // Check if FIREBASE_URL has been modified from the placeholder
            if (FIREBASE_URL.includes("PASTE_YOUR") === false) {
                try {
                    let res = await fetch(FIREBASE_URL);
                    let dateStr = await res.json();
                    if (dateStr) {
                        let [y, m, d] = dateStr.split('-');
                        return new Date(y, m - 1, d);
                    }
                } catch(e) { console.error("Firebase Fetch Error:", e); }
            }
            // Fallback to local storage if Firebase fails or is empty
            let loc = localStorage.getItem('guluDateStr');
            if (loc) {
                let [y, m, d] = loc.split('-');
                return new Date(y, m - 1, d);
            }
            return lastPeriodDate;
        }

        async function saveDateToDB(dateStr) {
            localStorage.setItem('guluDateStr', dateStr);
            if (FIREBASE_URL.includes("PASTE_YOUR") === false) {
                try {
                    await fetch(FIREBASE_URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dateStr)
                    });
                } catch(e) { console.error("Firebase Save Error:", e); }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
