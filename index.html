<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Lovely Gulu ❤️</title>
    <style>
        :root {
            --pink-main: #ff4d6d;
            --pink-light: #ffccd5;
            --pink-bg: #fff0f3;
            --green-main: #9cb315;
            --grey-main: #b0b0b0;
            --text-dark: #5a3a45;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6ea 0%, #fdfbfb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dark);
            padding: 20px;
            box-sizing: border-box;
            gap: 15px; /* Spacing between boxes */
        }

        /* The Separate Box Design */
        .box {
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 143, 163, 0.15);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        /* Specific Box Styles */
        .box-header {
            border-bottom: 4px solid var(--pink-main);
        }
        .box-note {
            background: var(--pink-bg);
            border: 2px solid var(--pink-light);
            font-size: 16px;
            font-style: italic;
            color: #800f2f;
            line-height: 1.4;
        }
        .box-calendar {
            padding: 15px 10px;
        }
        
        h1 {
            color: var(--pink-main);
            font-size: 26px;
            margin: 0 0 5px 0;
        }
        .subtitle {
            font-size: 14px;
            color: #888;
        }

        /* Phase Summary */
        .summary-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .summary-item {
            flex: 1;
            background: #f8f9fa;
            padding: 10px 5px;
            border-radius: 15px;
            border: 1px solid #eee;
        }
        .summary-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            height: 30px;
        }
        .summary-value {
            font-weight: bold;
            font-size: 13px;
            background: white;
            padding: 6px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .val-ovulation { color: var(--green-main); }
        .val-pms { color: var(--grey-main); }
        .val-period { color: var(--pink-main); }

        /* Weekly Calendar View */
        .week-container {
            display: flex;
            justify-content: space-between;
        }
        .day-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 13%;
        }
        .day-name {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .day-number {
            font-size: 16px;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .day-col.today .day-name { color: var(--green-main); }
        .day-col.today .day-number {
            border: 2px dashed var(--green-main);
            color: var(--green-main);
            font-weight: bold;
        }
        .dot {
            height: 6px;
            width: 6px;
            background-color: var(--text-dark);
            border-radius: 50%;
            margin-top: 2px;
            display: none;
        }
        .day-col.today .dot { display: block; }

        /* Countdown & Update */
        .countdown-text {
            font-size: 18px;
            font-weight: bold;
            color: #800f2f;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            color: #888;
        }
        input[type="date"] {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--pink-light);
            font-family: inherit;
            color: var(--text-dark);
            width: 60%;
            outline: none;
            margin-bottom: 10px;
        }
        button {
            background: var(--pink-main);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: background 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }
        button:hover { background: #c9184a; }
        .heart {
            color: var(--pink-main);
            animation: beat 1.5s infinite;
            display: inline-block;
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .sync-status {
            font-size: 11px;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Box 1: Header -->
    <div class="box box-header">
        <h1>Hi, Gulu! <span class="heart">❤️</span></h1>
        <div class="subtitle">Your personal tracker, made with love.</div>
    </div>

    <!-- Box 2: Daily Note -->
    <div class="box box-note" id="dailyNote">
        Loading your daily sweet note...
    </div>

    <!-- Box 3: Phase Summary -->
    <div class="box">
        <div class="summary-container">
            <div class="summary-item">
                <div class="summary-title">Next<br>Ovulation</div>
                <div class="summary-value val-ovulation">
                    <span style="font-size: 18px;">◯</span> <span id="lbl-ovu">--</span>
                </div>
            </div>
            <div class="summary-item">
                <div class="summary-title">Next<br>PMS</div>
                <div class="summary-value val-pms">
                    ☁️ <span id="lbl-pms">--</span>
                </div>
            </div>
            <div class="summary-item">
                <div class="summary-title">Next<br>Menstruation</div>
                <div class="summary-value val-period">
                    🩸 <span id="lbl-per">--</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Box 4: Weekly Map -->
    <div class="box box-calendar">
        <div class="week-container" id="weekCalendar"></div>
    </div>

    <!-- Box 5: Countdown -->
    <div class="box">
        <div class="countdown-text" id="countdown">Calculating...</div>
    </div>

    <!-- Box 6: Update Settings -->
    <div class="box">
        <label>Did your cycle start on a new day? Update here:</label>
        <input type="date" id="lastDateInput">
        <button onclick="updateDate()" id="saveBtn">Save New Date</button>
        <div class="sync-status" id="syncStatus">☁️ Connected</div>
    </div>

    <script>
        // --- ⚙️ SETTINGS ---
        const cycleLength = 26;
        const periodDuration = 7;
        
        // 🔴 DATABASE SETUP (Read Step 2 below to get your URL)
        // Paste your Firebase Realtime DB URL below. Keep the "/lastDate.json" at the end!
        const DATABASE_URL = "YOUR_FIREBASE_URL_HERE/lastDate.json";

        const notes = [
            "You are my favorite notification. Have a beautiful day, Gulu! 💕",
            "Just a daily reminder that you are deeply loved and cherished. 🥰",
            "Drink some water, take a deep breath, and know I'm thinking of you! 💧",
            "Your smile is my favorite thing in the whole world. Keep shining! ✨",
            "I'm so incredibly lucky to have you in my life. ❤️",
            "Whatever today brings, we handle it together. I love you! 🌸",
            "You are stronger and more beautiful than you know, Gulu! 🦋",
            "Sending you a massive virtual hug right now! 🤗",
            "You make every single day better just by being in it. ☀️",
            "Don't forget to treat yourself today. You deserve the world! 🍫",
            "I love you more today than I did yesterday. ❤️",
            "You are my safe place and my favorite adventure. 🌍",
            "Take it easy today, Gulu. I'm always right here for you. 🛋️",
            "Your laugh is my favorite melody. Hope you smile a lot today! 🎶",
            "Just dropping in to say: You are absolutely perfect to me. 😍",
            "You're doing amazing, sweetie! Keep going! 🌟",
            "I hope your day is as sweet and beautiful as you are. 🌷",
            "If you're feeling tired, rest. I've got your back, always. 🛌",
            "You are the best thing that ever happened to me. 💖",
            "Every day I spend with you is my new favorite day. 📆",
            "I'm sending you all my energy and love today! ⚡❤️",
            "You are a literal angel. Never forget that! 👼",
            "I'm so proud of you and everything you do. 🏆",
            "You mean the universe to me, Gulu. 🌌",
            "Take a moment to relax today. You've earned it! 🛀",
            "You're my forever favorite person. 👩‍❤️‍👨",
            "I love you past the moon and the stars! 🚀",
            "Whenever you feel stressed, remember I'm just a call away. 📞",
            "You look gorgeous today (I just know it!). 👗",
            "My love for you grows bigger every single day. 📈",
            "You are my dream come true. Sweet dreams, my Gulu. 💭"
        ];

        let lastPeriodDate = new Date('2026-07-06'); // Default backup

        // --- DATABASE FUNCTIONS ---
        async function fetchDateFromDB() {
            try {
                if (DATABASE_URL.includes("YOUR_FIREBASE_URL_HERE")) throw new Error("No DB Configured");
                let response = await fetch(DATABASE_URL);
                let dateStr = await response.json();
                if (dateStr) {
                    let [y, m, d] = dateStr.split('-');
                    return new Date(y, m - 1, d);
                }
            } catch (error) {
                console.log("Using Local Storage");
            }
            // Fallback to local storage if DB fails or isn't set up
            let localStr = localStorage.getItem('guluDateStr');
            if (localStr) {
                let [y, m, d] = localStr.split('-');
                return new Date(y, m - 1, d);
            }
            return lastPeriodDate;
        }

        async function saveDateToDB(dateStr) {
            localStorage.setItem('guluDateStr', dateStr); // Save locally first for instant feedback
            if (!DATABASE_URL.includes("YOUR_FIREBASE_URL_HERE")) {
                try {
                    await fetch(DATABASE_URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dateStr)
                    });
                } catch (e) {
                    console.error("Database save failed", e);
                }
            }
        }

        // --- APP LOGIC ---
        function formatDateShort(date) {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            let d = date.getDate();
            return `${d < 10 ? '0'+d : d} ${months[date.getMonth()]}`;
        }

        async function init() {
            const today = new Date();
            document.getElementById('dailyNote').innerText = notes[today.getDate() - 1];
            renderWeekCalendar(today);
            
            document.getElementById('syncStatus').innerText = "☁️ Syncing data...";
            lastPeriodDate = await fetchDateFromDB();
            updateDisplay();
            document.getElementById('syncStatus').innerText = "☁️ Up to date";
        }

        function renderWeekCalendar(today) {
            const calendarEl = document.getElementById('weekCalendar');
            calendarEl.innerHTML = '';
            const daysOfWeek = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            let startDay = new Date(today);
            startDay.setDate(today.getDate() - 3);

            for(let i = 0; i < 7; i++) {
                let currentDay = new Date(startDay);
                currentDay.setDate(startDay.getDate() + i);
                let isToday = (currentDay.getDate() === today.getDate() && currentDay.getMonth() === today.getMonth());
                
                let col = document.createElement('div');
                col.className = 'day-col' + (isToday ? ' today' : '');
                col.innerHTML = `
                    <div class="day-name">${daysOfWeek[currentDay.getDay()]}</div>
                    <div class="dot"></div>
                    <div class="day-number">${currentDay.getDate()}</div>
                `;
                calendarEl.appendChild(col);
            }
        }

        function updateDisplay() {
            const today = new Date();
            today.setHours(0,0,0,0);

            const nextPeriod = new Date(lastPeriodDate);
            nextPeriod.setDate(lastPeriodDate.getDate() + cycleLength);
            
            const periodEnd = new Date(nextPeriod);
            periodEnd.setDate(nextPeriod.getDate() + (periodDuration - 1));

            const ovulation = new Date(lastPeriodDate);
            ovulation.setDate(lastPeriodDate.getDate() + 14); 

            const pmsStart = new Date(nextPeriod);
            pmsStart.setDate(nextPeriod.getDate() - 3);
            const pmsEnd = new Date(nextPeriod);
            pmsEnd.setDate(nextPeriod.getDate() - 1);

            document.getElementById('lbl-ovu').innerText = formatDateShort(ovulation);
            document.getElementById('lbl-pms').innerText = `${pmsStart.getDate()}-${formatDateShort(pmsEnd)}`;
            document.getElementById('lbl-per').innerText = `${nextPeriod.getDate() < 10 ? '0'+nextPeriod.getDate() : nextPeriod.getDate()}-${formatDateShort(periodEnd)}`;

            const checkDate = new Date(nextPeriod);
            checkDate.setHours(0,0,0,0);
            const diffTime = checkDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            let countdownText = "";
            if (diffDays > 0) {
                countdownText = `⏳ ${diffDays} days left until period.`;
            } else if (diffDays <= 0 && diffDays > -periodDuration) {
                countdownText = `🩸 Period active. Heating pad ready! ❤️`;
            } else {
                countdownText = `⏰ It's ${Math.abs(diffDays)} days late! (Update date below if it started) 🌸`;
            }
            document.getElementById('countdown').innerText = countdownText;
            
            // Format for HTML date input: YYYY-MM-DD
            let y = lastPeriodDate.getFullYear();
            let m = String(lastPeriodDate.getMonth() + 1).padStart(2, '0');
            let d = String(lastPeriodDate.getDate()).padStart(2, '0');
            document.getElementById('lastDateInput').value = `${y}-${m}-${d}`;
        }

        async function updateDate() {
            const inputVal = document.getElementById('lastDateInput').value; // Format: YYYY-MM-DD
            if (inputVal) {
                let btn = document.getElementById('saveBtn');
                btn.innerText = "Saving...";
                
                let [y, m, d] = inputVal.split('-');
                lastPeriodDate = new Date(y, m - 1, d); // Safe timezone parsing
                
                await saveDateToDB(inputVal);
                updateDisplay();
                
                btn.innerText = "Save New Date";
                alert("Date saved globally! It will now update on Gulu's phone too. ❤️");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
